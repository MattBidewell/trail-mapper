<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trail Mapper</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #f0f4f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      min-height: 100%;
      gap: 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #2d4a2d;
      letter-spacing: 0.5px;
    }
    .upload-zone {
      width: 100%;
      max-width: 1100px;
      border: 2px dashed #a0b8a0;
      border-radius: 10px;
      padding: 28px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: white;
      color: #5a7a5a;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #2d4a2d;
      background: #edf4ed;
    }
    .upload-zone p { font-size: 15px; margin-bottom: 10px; }
    .upload-zone .hint { font-size: 12px; color: #999; margin-top: 8px; margin-bottom: 0; }
    .upload-zone .route-count { font-size: 13px; color: #2d4a2d; font-weight: 600; margin-top: 6px; margin-bottom: 0; }
    .btn {
      background: #2d4a2d;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      min-height: 44px;
    }
    .btn:hover { background: #3d6a3d; }
    .map-container {
      width: 100%;
      max-width: 1100px;
      height: 600px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      border: 2px solid #c8d8c8;
    }
    @media (max-width: 640px) {
      .page { padding: 12px; gap: 12px; }
      h1 { font-size: 22px; }
      .upload-zone { padding: 16px 14px; }
      .map-container { height: calc(100dvh - 230px); min-height: 280px; border-radius: 8px; }
    }
    #map { height: 100%; width: 100%; }
    .legend {
      background: white;
      padding: 10px 14px;
      border-radius: 5px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.3);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
    }
    .legend h4 { margin: 0 0 8px 0; font-size: 14px; color: #333; }
    .legend-item { display: flex; align-items: center; margin-bottom: 6px; }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-color { width: 20px; height: 4px; margin-right: 8px; border-radius: 2px; flex-shrink: 0; }
    .legend-name { color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .footer {
      font-size: 13px;
      color: #7a9a7a;
    }
    .footer a {
      color: #2d4a2d;
      text-decoration: none;
      font-weight: 500;
    }
    .footer a:hover { text-decoration: underline; }
    .error-msg {
      width: 100%;
      max-width: 1100px;
      background: #fff0f0;
      border: 1px solid #f5a0a0;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #c00;
      display: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Trail Mapper</h1>

    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept=".gpx" multiple style="display:none">
      <p>Add GPX files to your map</p>
      <button class="btn" id="browse-btn">Browse files</button>
      <p class="hint">Drag &amp; drop or tap to browse &mdash; multiple files supported</p>
      <p class="route-count" id="route-count" style="display:none"></p>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="map-container">
      <div id="map"></div>
    </div>

    <p class="footer">Made with ❤️ by <a href="https://matty.dev" target="_blank" rel="noopener">Matt Bidewell</a></p>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
